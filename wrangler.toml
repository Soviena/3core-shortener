name = "3core"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Bundle .html files as raw text so they can be imported directly in src/index.js.
rules = [
  { type = "Text", globs = ["**/*.html"], fallthrough = true }
]

# Run `wrangler kv namespace create URLS` and paste the returned id below.
kv_namespaces = [
  { binding = "KV", id = "49f84bd834ad459b8636f73363ca6249", preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID" }
]
